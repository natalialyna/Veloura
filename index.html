<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veloura — Entscheiden, aber make it fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --forest: #40594f;
      --lime: #ecf38f;
      --sky: #a1baf5;
      --lavender: #9698dc;
      --coral: #df663a;
      --cream: #f5f2eb;
      --offwhite: #faf9f6;
      --text: #1a1a1a;
      --muted: #888;
      --card: rgba(255,255,255,0.72);
      --radius: 20px;
      --shadow: 0 8px 40px rgba(0,0,0,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--offwhite);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* BG blobs */
    .bg-blob {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; pointer-events: none; z-index: 0;
    }
    .blob1 { width: 500px; height: 500px; background: var(--lime); top: -100px; left: -150px; }
    .blob2 { width: 400px; height: 400px; background: var(--sky); bottom: -80px; right: -100px; }
    .blob3 { width: 300px; height: 300px; background: var(--lavender); top: 40%; left: 60%; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 40px;
      background: rgba(250,249,246,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 12px; cursor: pointer;
    }
    .logo-circle {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--forest); color: var(--lime);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700;
      box-shadow: 0 0 0 3px rgba(161,186,245,0.4);
    }
    .nav-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
    .nav-links { display: flex; gap: 8px; }
    .nav-btn {
      padding: 8px 20px; border-radius: 50px; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      background: transparent; color: var(--text); transition: all 0.2s;
    }
    .nav-btn:hover { background: rgba(0,0,0,0.05); }
    .nav-btn.active { background: var(--forest); color: var(--lime); }

    /* PAGES */
    .page { display: none; position: relative; z-index: 1; }
    .page.active { display: block; min-height: 100vh; }

    /* HOME */
    #home {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 120px 40px 80px;
    }
    .home-logo {
      width: 90px; height: 90px; border-radius: 50%;
      background: var(--forest); color: var(--lime);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700;
      margin: 0 auto 24px;
      box-shadow: 0 0 0 6px rgba(161,186,245,0.3), 0 20px 60px rgba(64,89,79,0.2);
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .home-title {
      font-family: 'Playfair Display', serif; font-size: clamp(48px,7vw,80px);
      line-height: 1.1; margin-bottom: 20px;
    }
    .home-title em { color: var(--coral); font-style: italic; }
    .home-sub { font-size: 18px; color: var(--muted); max-width: 440px; margin: 0 auto 48px; line-height: 1.6; }
    .btn-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      padding: 16px 36px; border-radius: 50px; border: none; cursor: pointer;
      background: var(--forest); color: var(--lime);
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(64,89,79,0.25);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(64,89,79,0.35); }
    .btn-secondary {
      padding: 16px 36px; border-radius: 50px; border: 1.5px solid rgba(0,0,0,0.12);
      cursor: pointer; background: white; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500;
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: var(--cream); }

    /* CREATE PAGE */
    #create { padding: 120px 40px 80px; max-width: 720px; margin: 0 auto; }
    .page-label { font-size: 11px; font-weight: 500; letter-spacing: 2px; color: var(--coral); text-transform: uppercase; margin-bottom: 8px; }
    .page-title { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 40px; }
    .card {
      background: var(--card); backdrop-filter: blur(20px);
      border-radius: var(--radius); padding: 36px;
      box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.8);
    }
    .field-label { font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; }
    .field-group { margin-bottom: 24px; }
    .input-field {
      width: 100%; padding: 14px 18px; border-radius: 14px;
      border: 1.5px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.8);
      font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .input-field:focus { border-color: var(--forest); }
    .input-field::placeholder { color: #bbb; }
    .select-wrap { position: relative; }
    .select-field {
      width: 100%; padding: 14px 18px; border-radius: 14px;
      border: 1.5px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.8);
      font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text);
      outline: none; appearance: none; cursor: pointer;
    }
    .select-arrow { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--muted); }

    .options-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .ai-btn {
      background: none; border: none; cursor: pointer;
      color: var(--lavender); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 6px; transition: opacity 0.2s;
    }
    .ai-btn:hover { opacity: 0.7; }
    .option-item {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .option-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .option-input {
      flex: 1; padding: 12px 16px; border-radius: 12px;
      border: 1.5px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.8);
      font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .option-input:focus { border-color: var(--forest); }
    .option-remove {
      background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px;
      transition: color 0.2s; line-height: 1;
    }
    .option-remove:hover { color: var(--coral); }
    .add-option-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px;
      display: flex; align-items: center; gap: 6px; padding: 8px 0;
      transition: color 0.2s;
    }
    .add-option-btn:hover { color: var(--forest); }
    .start-btn {
      width: 100%; padding: 16px; border-radius: 14px; border: none; cursor: pointer;
      background: var(--forest); color: var(--lime);
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500;
      margin-top: 28px; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(64,89,79,0.2);
    }
    .start-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(64,89,79,0.3); }

    /* VOTE PAGE */
    #vote { padding: 100px 40px 80px; max-width: 1100px; margin: 0 auto; }
    .vote-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .back-btn {
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 14px; display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }
    .vote-meta { display: flex; align-items: center; gap: 12px; }
    .badge {
      padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 500;
    }
    .badge-aktiv { background: var(--lime); color: var(--forest); }
    .badge-beendet { background: #f0f0f0; color: var(--muted); }
    .vote-code { color: var(--muted); font-size: 13px; }
    .vote-title { font-family: 'Playfair Display', serif; font-size: clamp(28px,4vw,48px); margin: 12px 0 36px; }
    .vote-btns { display: flex; gap: 12px; }
    .link-btn, .end-btn {
      padding: 8px 20px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
    }
    .link-btn { border: 1.5px solid rgba(0,0,0,0.12); background: white; color: var(--text); transition: all 0.2s; }
    .link-btn:hover { background: var(--cream); }
    .end-btn { border: 1.5px solid var(--coral); background: white; color: var(--coral); transition: all 0.2s; }
    .end-btn:hover { background: var(--coral); color: white; }

    .vote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media(max-width:768px){ .vote-grid{grid-template-columns:1fr;} }

    /* WHEEL */
    .wheel-card { background: var(--card); backdrop-filter: blur(20px); border-radius: var(--radius); padding: 36px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.8); display: flex; flex-direction: column; align-items: center; }
    .wheel-result-label {
      font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 24px;
      padding: 10px 24px; background: white; border-radius: 50px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); min-width: 160px; text-align: center;
    }
    .wheel-wrap { position: relative; margin-bottom: 28px; }
    #wheelCanvas { display: block; }
    .wheel-pointer {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 24px solid var(--lavender);
      filter: drop-shadow(0 2px 6px rgba(150,152,220,0.5));
    }
    .wheel-controls { display: flex; gap: 12px; }
    .spin-btn {
      padding: 12px 28px; border-radius: 50px; border: none; cursor: pointer;
      background: var(--forest); color: var(--lime);
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .spin-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(64,89,79,0.3); }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .ctrl-btn {
      padding: 12px 20px; border-radius: 50px; border: 1.5px solid rgba(0,0,0,0.12);
      background: white; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px;
      display: flex; align-items: center; gap: 6px; color: var(--text); transition: all 0.2s;
    }
    .ctrl-btn:hover:not(:disabled) { background: var(--cream); }
    .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* VOTE PANEL */
    .vote-panel { display: flex; flex-direction: column; gap: 16px; }
    .vote-list-card { background: var(--card); backdrop-filter: blur(20px); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.8); }
    .panel-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 20px; }
    .vote-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer;
      transition: all 0.2s; border-radius: 8px; padding: 10px 12px;
    }
    .vote-option:hover { background: rgba(0,0,0,0.02); }
    .vote-option.voted { background: rgba(64,89,79,0.06); }
    .opt-left { display: flex; align-items: center; gap: 12px; }
    .opt-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .opt-name { font-size: 15px; font-weight: 400; }
    .opt-count { font-size: 14px; color: var(--muted); }
    .vote-it-btn {
      padding: 6px 16px; border-radius: 50px; border: 1.5px solid rgba(0,0,0,0.12);
      background: white; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px;
      transition: all 0.2s; color: var(--text);
    }
    .vote-it-btn:hover { background: var(--forest); color: var(--lime); border-color: var(--forest); }
    .vote-it-btn.voted { background: var(--forest); color: var(--lime); border-color: var(--forest); }

    .results-card { background: var(--card); backdrop-filter: blur(20px); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.8); }
    .no-votes { color: var(--muted); font-size: 14px; text-align: center; padding: 24px 0; }

    /* RECIPE MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 24px; padding: 40px; max-width: 540px; width: 100%;
      max-height: 80vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.15);
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-close { float: right; background: none; border: none; cursor: pointer; font-size: 22px; color: var(--muted); }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 6px; }
    .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .recipe-section { margin-bottom: 20px; }
    .recipe-section h4 { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--coral); margin-bottom: 10px; }
    .recipe-section ul { list-style: none; }
    .recipe-section li { font-size: 14px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; color: #444; }
    .recipe-section p { font-size: 14px; line-height: 1.7; color: #444; }
    .nutrition-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .nutr-item { background: var(--cream); border-radius: 12px; padding: 12px; text-align: center; }
    .nutr-val { font-size: 20px; font-weight: 600; color: var(--forest); }
    .nutr-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* AI LOADING */
    .ai-loading { display: flex; align-items: center; gap: 8px; color: var(--lavender); font-size: 13px; padding: 8px 0; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(150,152,220,0.2); border-top-color: var(--lavender); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ARCHIV */
    #archiv { padding: 120px 40px 80px; max-width: 1100px; margin: 0 auto; }
    .archive-controls { display: flex; gap: 12px; margin-bottom: 36px; flex-wrap: wrap; }
    .search-input {
      flex: 1; min-width: 200px; padding: 12px 18px; border-radius: 50px;
      border: 1.5px solid rgba(0,0,0,0.08); background: white;
      font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
    }
    .search-input:focus { border-color: var(--forest); }
    .filter-select {
      padding: 12px 18px; border-radius: 50px; border: 1.5px solid rgba(0,0,0,0.08);
      background: white; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; outline: none;
    }
    .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 20px; }
    .archive-card {
      background: var(--card); backdrop-filter: blur(20px); border-radius: 18px;
      padding: 24px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.8);
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .archive-card:hover { transform: translateY(-3px); box-shadow: 0 16px 50px rgba(0,0,0,0.1); }
    .arc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .arc-cat { font-size: 11px; padding: 4px 10px; border-radius: 50px; background: rgba(0,0,0,0.05); color: var(--muted); }
    .arc-q { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 12px; line-height: 1.3; }
    .arc-votes { font-size: 13px; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .arc-dots { display: flex; gap: 5px; }
    .arc-dot { width: 10px; height: 10px; border-radius: 50%; }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 0; color: var(--muted); font-size: 16px; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--forest); color: var(--lime); padding: 14px 28px; border-radius: 50px;
      font-size: 14px; font-weight: 500; z-index: 300; transition: transform 0.3s ease;
      box-shadow: 0 8px 30px rgba(64,89,79,0.3);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    /* CONFETTI */
    #confettiCanvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 999; display: none;
    }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<!-- NAV -->
<nav>
  <div class="nav-logo" onclick="showPage('home')">
    <div class="logo-circle">V</div>
    <span class="nav-name">Veloura</span>
  </div>
  <div class="nav-links">
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')">🏠 Home</button>
    <button class="nav-btn" id="nav-create" onclick="showPage('create')">+ Erstellen</button>
    <button class="nav-btn" id="nav-archiv" onclick="showPage('archiv')">🗃 Archiv</button>
  </div>
</nav>

<!-- HOME -->
<div class="page active" id="home">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 40px 80px">
    <div class="home-logo">V</div>
    <h1 class="home-title">Entscheide, aber <em>make it fun</em></h1>
    <p class="home-sub">Lass das Rad entscheiden und trau dich etwas Neues.</p>
    <div class="btn-row">
      <button class="btn-primary" onclick="showPage('create')">Abstimmung erstellen →</button>
      <button class="btn-secondary" onclick="showPage('archiv')">Archiv durchstöbern</button>
    </div>
  </div>
</div>

<!-- CREATE -->
<div class="page" id="create">
  <div style="max-width:720px;margin:0 auto;padding:120px 40px 80px">
    <div class="page-label">NEU ERSTELLEN</div>
    <h1 class="page-title">Deine Abstimmung</h1>
    <div class="card">
      <div class="field-group">
        <div class="field-label">FRAGE</div>
        <input type="text" id="questionInput" class="input-field" placeholder="Was essen wir heute Abend?">
      </div>
      <div class="field-group">
        <div class="field-label">KATEGORIE</div>
        <div class="select-wrap">
          <select id="categorySelect" class="select-field">
            <option>Sonstiges</option>
            <option>Outdoor</option>
            <option>Indoor</option>
            <option>Activity</option>
            <option>Natur</option>
            <option>Gesundheit</option>
            <option>Food</option>
            <option>Design</option>
            <option>Reisen</option>
            <option>Essen</option>
          </select>
          <span class="select-arrow">∨</span>
        </div>
      </div>
      <div class="field-group">
        <div class="options-header">
          <div class="field-label" style="margin:0">OPTIONEN</div>
          <button class="ai-btn" onclick="generateAIIdeas()">✦ KI-Ideen generieren</button>
        </div>
        <div id="optionsList"></div>
        <div id="aiLoadingMsg" style="display:none" class="ai-loading"><div class="spinner"></div> KI denkt nach…</div>
        <button class="add-option-btn" onclick="addOption()">+ Option hinzufügen</button>
      </div>
      <button class="start-btn" onclick="startVote()">Abstimmung starten →</button>
    </div>
  </div>
</div>

<!-- VOTE -->
<div class="page" id="vote">
  <div style="max-width:1100px;margin:0 auto;padding:100px 40px 80px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:12px">
      <button class="back-btn" onclick="showPage('archiv')">← Zurück</button>
      <div style="display:flex;gap:12px">
        <button class="link-btn" onclick="copyLink()">🔗 Link</button>
        <button class="end-btn" onclick="endVote()">Beenden</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <span class="badge badge-aktiv" id="voteBadge">Aktiv</span>
      <span class="vote-code" id="voteCode">#VELOURA</span>
    </div>
    <h2 class="vote-title" id="voteTitle">Frage</h2>
    <div class="vote-grid">
      <!-- Wheel -->

          <button class="ctrl-btn" id="stopBtn" onclick="stopWheel()" disabled>◻ Stop</button>
          <button class="ctrl-btn" onclick="generateAIIdeasVote()">✦ KI-Ideen</button>

      </div>

      <div class="vote-panel">
        <div class="vote-list-card">
          <div class="panel-title">Abstimmen</div>
          <div id="voteOptionsList"></div>
        </div>
        <div class="results-card">
          <div class="panel-title">Ergebnisse</div>
          <div id="resultsArea"><div class="no-votes">Noch keine Stimmen abgegeben</div></div>

<div class="page" id="archiv">
  <div style="max-width:1100px;margin:0 auto;padding:120px 40px 80px">

        <option>Outdoor</option><option>Indoor</option><option>Activity</option>

        <option>Design</option><option>Reisen</option><option>Essen</option><option>Sonstiges</option>
      </select>

<script>
// ─── STATE ─────────────────────────────────────────────────────────────────
const COLORS = ['#40594f','#a1baf5','#9698dc','#ecf38f','#6db088','#c4d4f8','#b8b9e8','#f2f7a0','#df663a','#f5a88a'];
let polls = JSON.parse(localStorage.getItem('veloura_polls') || '[]');
let currentPoll = null;
let userVote = null;
let chartInstance = null;

// Wheel state
let wheelAngle = 0;
let wheelVelocity = 0;
let wheelSpinning = false;
let wheelRAF = null;
let wheelStopping = false;

function savePols() { localStorage.setItem('veloura_polls', JSON.stringify(polls)); }

// ─── NAVIGATION ────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById(id);
  if (target) target.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + id);
  if (nb) nb.classList.add('active');
  if (id === 'archiv') renderArchive();
  if (id === 'create') initCreate();
  // Scroll to very top reliably
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ─── CREATE ────────────────────────────────────────────────────────────────
let options = [];
function initCreate() {
  document.getElementById('questionInput').value = '';
  document.getElementById('categorySelect').value = 'Sonstiges';
  options = [{val:''},{val:''}];
  renderOptions();
}
function renderOptions() {
  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  options.forEach((o, i) => {
    const div = document.createElement('div');
    div.className = 'option-item';
    div.innerHTML = `
      <div class="option-dot" style="background:${COLORS[i % COLORS.length]}"></div>
      <input class="option-input" value="${o.val}" placeholder="Option ${i+1}" oninput="options[${i}].val=this.value">
      ${options.length > 2 ? `<button class="option-remove" onclick="removeOption(${i})">✕</button>` : ''}
    `;
    list.appendChild(div);
  });
}
function addOption() {
  if (options.length >= 10) return;
  options.push({val:''});
  renderOptions();
}
function removeOption(i) {
  options.splice(i,1);
  renderOptions();
}

// ─── SMART FALLBACKS (used if API unavailable) ───────────────────────────────
const FALLBACKS = {
  Food: ['Miso-Aubergine mit Sesamreis', 'Kichererbsensalat mit Feta', 'Zucchini-Nudeln mit Lachs', 'Ofensüßkartoffel mit Tahini', 'Grünes Kokos-Curry', 'Mediterrane Bowl'],
  Essen: ['Miso-Aubergine mit Sesamreis', 'Quinoa-Bowl mit Granatapfel', 'Lachspasta mit Limette', 'Edamame-Reisschale', 'Linsensuppe mit Kokos', 'Griechischer Kichererbsensalat'],
  Outdoor: ['Wandern', 'Klettern', 'Radtour', 'Kajakfahren', 'Camping', 'Trailrunning'],
  Indoor: ['Yoga', 'Pilates', 'Kletterpark', 'Tanzen', 'Bouldern', 'Schwimmen'],
  Activity: ['Escape Room', 'Bowling', 'Minigolf', 'Karaoke', 'Kochen lernen', 'Töpfern'],
  Natur: ['Pilze sammeln', 'Picknick', 'Vogelbeobachtung', 'Badeausflug', 'Bergwanderung', 'Wildkräuter'],
  Gesundheit: ['Meditation', 'Kältedusche', 'Digital Detox', 'Waldspaziergang', 'Atemübungen', 'Journaling'],
  Design: ['Minimalistisch', 'Editorial', 'Brutalistisch', 'Organic Shapes', 'Glassmorphism', 'Typografisch'],
  Reisen: ['Lissabon', 'Kyoto', 'Kopenhagen', 'Oaxaca', 'Ljubljana', 'Tbilisi'],
  Sonstiges: ['Option A', 'Option B', 'Option C', 'Option D', 'Option E', 'Option F']
};

function getFallback(cat, q) {
  const isFood = /essen|kochen|gericht|food|abend|mittag|frühstück/i.test(q);
  if (isFood) return FALLBACKS['Food'];
  return FALLBACKS[cat] || FALLBACKS['Sonstiges'];
}

async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 400,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) throw new Error('API error');
  const data = await res.json();
  const text = data.content?.map(c => c.text || '').join('') || '[]';
  return text.replace(/```json|```/g, '').trim();
}

async function generateAIIdeas() {
  const q = document.getElementById('questionInput').value.trim();
  const cat = document.getElementById('categorySelect').value;
  if (!q) { showToast('Bitte zuerst eine Frage eingeben'); return; }
  document.getElementById('aiLoadingMsg').style.display = 'flex';

  try {
    const isFood = cat === 'Food' || cat === 'Essen' || /essen|gericht|kochen|food|abend|mittag/i.test(q);
    const prompt = isFood
      ? `Du bist ein Foodie mit Fokus auf gesunde, moderne Küche. Generiere 6 außergewöhnliche, nährstoffreiche Gerichte als kurze Namen (2-5 Wörter, deutsch) für die Frage: "${q}". 
Beispiele guter Antworten: "Miso-Aubergine mit Sesamreis", "Kichererbsensalat mit Feta", "Zucchini-Nudeln mit Lachs".
Antworte NUR mit einem validen JSON-Array: ["Name1","Name2","Name3","Name4","Name5","Name6"]`
      : `Generiere 6 kreative, konkrete Antwortoptionen (1-4 Wörter, deutsch) für die Abstimmungsfrage: "${q}" (Kategorie: ${cat}).
Beispiele: Für "Wohin Reisen?" → ["Lissabon","Kyoto","Kopenhagen","Oaxaca","Ljubljana","Tbilisi"]. Für "Welchen Sport?" → ["Klettern","Yoga","Padel","Tanzen","Schwimmen","Radfahren"].
Antworte NUR mit einem validen JSON-Array: ["Option1","Option2","Option3","Option4","Option5","Option6"]`;

    const raw = await callClaude(prompt);
    const ideas = JSON.parse(raw);
    if (Array.isArray(ideas) && ideas.length >= 2 && ideas.every(i => typeof i === 'string')) {
      options = ideas.slice(0, 8).map(v => ({ val: String(v) }));
    } else {
      throw new Error('invalid response');
    }
  } catch(e) {
    // Smart fallback — real curated answers, not "Idee A"
    const fb = getFallback(cat, q);
    options = fb.map(v => ({ val: v }));
  }
  renderOptions();
  document.getElementById('aiLoadingMsg').style.display = 'none';
}

function startVote() {
  const q = document.getElementById('questionInput').value.trim();
  const cat = document.getElementById('categorySelect').value;
  const opts = options.map(o=>o.val.trim()).filter(Boolean);
  if (!q) { showToast('Bitte eine Frage eingeben'); return; }
  if (opts.length < 2) { showToast('Mindestens 2 Optionen nötig'); return; }

  const code = '#' + Math.random().toString(36).substr(2,6).toUpperCase();
  const poll = {
    id: Date.now(), code, question: q, category: cat,
    options: opts.map((v,i) => ({name:v, votes:0, color:COLORS[i%COLORS.length]})),
    status: 'Aktiv', created: new Date().toISOString()
  };
  polls.unshift(poll);
  savePols();
  openVote(poll);
}

// ─── VOTE ───────────────────────────────────────────────────────────────────
function openVote(poll) {
  currentPoll = poll;
  userVote = null;
  document.getElementById('voteTitle').textContent = poll.question;
  document.getElementById('voteCode').textContent = poll.code;
  const badge = document.getElementById('voteBadge');
  badge.textContent = poll.status;
  badge.className = 'badge ' + (poll.status === 'Aktiv' ? 'badge-aktiv' : 'badge-beendet');
  renderVoteOptions();
  drawWheel();
  renderResults();
  showPage('vote');
}

function renderVoteOptions() {
  const list = document.getElementById('voteOptionsList');
  list.innerHTML = '';
  currentPoll.options.forEach((o, i) => {
    const isFood = currentPoll.category === 'Food' || currentPoll.category === 'Essen' || /essen|gericht|kochen/i.test(currentPoll.question);
    const div = document.createElement('div');
    div.className = 'vote-option' + (userVote === i ? ' voted' : '');
    div.innerHTML = `
      <div class="opt-left">
        <div class="opt-dot" style="background:${o.color}"></div>
        <span class="opt-name">${o.name}</span>
        ${isFood ? `<button onclick="showRecipe('${o.name}')" style="background:none;border:none;cursor:pointer;color:var(--coral);font-size:12px;margin-left:4px">↗ Rezept</button>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="opt-count">${o.votes}</span>
        <button class="vote-it-btn ${userVote===i?'voted':''}" onclick="castVote(${i})">${userVote===i?'✓':'Stimme'}</button>
      </div>
    `;
    list.appendChild(div);
  });
}

function castVote(i) {
  if (currentPoll.status !== 'Aktiv') { showToast('Abstimmung beendet'); return; }
  if (userVote !== null) {
    currentPoll.options[userVote].votes--;
  }
  userVote = i;
  currentPoll.options[i].votes++;
  savePols();
  renderVoteOptions();
  renderResults();
}

function endVote() {
  currentPoll.status = 'Beendet';
  savePols();
  const badge = document.getElementById('voteBadge');
  badge.textContent = 'Beendet';
  badge.className = 'badge badge-beendet';
  showToast('Abstimmung beendet');
}

function copyLink() {
  navigator.clipboard?.writeText(window.location.href + '?poll=' + currentPoll.id).catch(()=>{});
  showToast('Link kopiert!');
}

// ─── RESULTS ────────────────────────────────────────────────────────────────
function renderResults() {
  const total = currentPoll.options.reduce((s,o)=>s+o.votes,0);
  const area = document.getElementById('resultsArea');
  const chartCanvas = document.getElementById('resultsChart');

  if (total === 0) {
    area.innerHTML = '<div class="no-votes">Noch keine Stimmen abgegeben</div>';
    chartCanvas.style.display = 'none';
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    return;
  }

  area.innerHTML = currentPoll.options.map(o => {
    const pct = total ? Math.round(o.votes/total*100) : 0;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${o.color};display:inline-block"></span>${o.name}</span>
        <span style="font-weight:500">${pct}%</span>
      </div>
      <div style="background:#f0f0f0;border-radius:50px;height:6px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${o.color};border-radius:50px;transition:width 0.5s ease"></div>
      </div>
    </div>`;
  }).join('');

  chartCanvas.style.display = 'block';
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(chartCanvas, {
    type: 'doughnut',
    data: {
      labels: currentPoll.options.map(o=>o.name),
      datasets: [{ data: currentPoll.options.map(o=>o.votes||0.001), backgroundColor: currentPoll.options.map(o=>o.color), borderWidth: 0 }]
    },
    options: { plugins: { legend: { display: false } }, cutout: '65%', animation: { duration: 600 } }
  });
}

// ─── WHEEL ──────────────────────────────────────────────────────────────────
function drawWheel() {
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const cx = 150, cy = 150, r = 140;
  ctx.clearRect(0,0,300,300);
  const n = currentPoll.options.length;
  const arc = (2*Math.PI) / n;

  for (let i = 0; i < n; i++) {
    const start = wheelAngle + i * arc;
    const end = start + arc;
    const o = currentPoll.options[i];
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = o.color;
    ctx.fill();

    // Gloss overlay
    ctx.save();
    ctx.globalAlpha = 0.15;
    const grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, r);
    grad.addColorStop(0, 'white');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Label
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px DM Sans, sans-serif';
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 4;
    const name = o.name.length > 10 ? o.name.substr(0,10)+'…' : o.name;
    ctx.fillText(name, r - 10, 5);
    ctx.restore();
  }

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 12, 0, 2*Math.PI);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, 2*Math.PI);
  ctx.fillStyle = '#ccc';
  ctx.fill();

  // Update label
  const labelIdx = getCurrentSegment();
  document.getElementById('wheelLabel').textContent = currentPoll.options[labelIdx]?.name || '—';
}

function getCurrentSegment() {
  const n = currentPoll.options.length;
  const arc = (2*Math.PI)/n;
  // Pointer at top = -π/2
  const normalized = ((-Math.PI/2 - wheelAngle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  return Math.floor(normalized / arc) % n;
}

function spinWheel() {
  if (wheelSpinning) return;
  wheelSpinning = true;
  wheelStopping = false;
  wheelVelocity = 0.15 + Math.random() * 0.1;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  animateWheel();
}

function stopWheel() {
  wheelStopping = true;
  document.getElementById('stopBtn').disabled = true;
}

function animateWheel() {
  if (!wheelSpinning) return;
  if (wheelStopping) {
    wheelVelocity *= 0.965;
  } else {
    if (wheelVelocity < 0.18) wheelVelocity += 0.004;
  }
  wheelAngle += wheelVelocity;
  drawWheel();
  if (wheelStopping && wheelVelocity < 0.002) {
    wheelSpinning = false;
    wheelStopping = false;
    document.getElementById('spinBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    const winner = getCurrentSegment();
    castVote(winner);
    showToast('🎯 ' + currentPoll.options[winner].name + ' wurde gewählt!');
    launchConfetti();
    return;
  }
  wheelRAF = requestAnimationFrame(animateWheel);
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  const colors = ['#ecf38f','#a1baf5','#9698dc','#df663a','#40594f','#f5a88a','#c4d4f8'];
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * 100,
    r: 4 + Math.random() * 7,
    color: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random() * Math.PI * 2,
    vx: (Math.random() - 0.5) * 4,
    vy: 2 + Math.random() * 4,
    vr: (Math.random() - 0.5) * 0.15,
    shape: Math.random() > 0.5 ? 'rect' : 'circle'
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.vy += 0.1;
      if (p.y < canvas.height + 20) alive = true;
      ctx.save();
      ctx.globalAlpha = Math.max(0, 1 - frame/90);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
      } else {
        ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });
    frame++;
    if (alive && frame < 120) requestAnimationFrame(draw);
    else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none'; }
  }
  draw();
}

// ─── AI IDEAS IN VOTE ───────────────────────────────────────────────────────
async function generateAIIdeasVote() {
  showToast('KI denkt nach…');
  const q = currentPoll.question;
  const cat = currentPoll.category;
  try {
    const isFood = cat === 'Food' || cat === 'Essen' || /essen|gericht|kochen/i.test(q);
    const prompt = isFood
      ? `Schlage 4 gesunde, außergewöhnliche Gerichte (2-5 Wörter, deutsch) vor für: "${q}". Nur JSON-Array z.B. ["Miso-Aubergine","Quinoa-Bowl","Lachspasta","Edamame-Bowl"]. Keine Erklärungen.`
      : `Schlage 4 kreative, konkrete Optionen (1-3 Wörter, deutsch) vor für: "${q}" (${cat}). Nur JSON-Array. Keine Erklärungen.`;
    const raw = await callClaude(prompt);
    const ideas = JSON.parse(raw);
    if (Array.isArray(ideas) && ideas.length) {
      ideas.forEach(v => {
        if (currentPoll.options.length < 10) {
          currentPoll.options.push({name:String(v), votes:0, color:COLORS[currentPoll.options.length%COLORS.length]});
        }
      });
      savePols(); renderVoteOptions(); drawWheel();
      showToast('KI-Ideen hinzugefügt!');
    }
  } catch(e) {
    // Use curated fallback
    const fb = getFallback(cat, q).slice(0, 3);
    fb.forEach(v => {
      if (currentPoll.options.length < 10 && !currentPoll.options.find(o=>o.name===v)) {
        currentPoll.options.push({name:v, votes:0, color:COLORS[currentPoll.options.length%COLORS.length]});
      }
    });
    savePols(); renderVoteOptions(); drawWheel();
    showToast('Ideen hinzugefügt!');
  }
}

// ─── RECIPE ─────────────────────────────────────────────────────────────────
async function showRecipe(dish) {
  document.getElementById('recipeModal').classList.add('open');
  document.getElementById('recipeContent').innerHTML = `<div class="ai-loading" style="justify-content:center;padding:40px 0"><div class="spinner"></div> Rezept wird geladen…</div>`;
  try {
    const prompt = `Erstelle ein kurzes, elegantes Rezept für "${dish}". Antworte NUR als JSON:
{"title":"${dish}","time":"X Min","servings":2,"ingredients":["200g Zutat","..."],"steps":["Schritt 1...","..."],"calories":350,"protein":"20g","carbs":"40g"}
Keine Erklärungen, nur das JSON-Objekt.`;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:600, messages:[{role:'user',content:prompt}] })
    });
    const data = await res.json();
    const text = data.content?.map(c=>c.text||'').join('')||'{}';
    const r = JSON.parse(text.replace(/```json|```/g,'').trim());
    document.getElementById('recipeContent').innerHTML = `
      <button class="modal-close" onclick="closeRecipe()">✕</button>
      <div class="modal-title">${r.title}</div>
      <div class="modal-sub">⏱ ${r.time} · 🍽 ${r.servings} Portionen</div>
      <div class="recipe-section"><h4>Zutaten</h4><ul>${(r.ingredients||[]).map(i=>`<li>${i}</li>`).join('')}</ul></div>
      <div class="recipe-section"><h4>Zubereitung</h4>${(r.steps||[]).map((s,i)=>`<p style="margin-bottom:8px"><strong>${i+1}.</strong> ${s}</p>`).join('')}</div>
      <div class="recipe-section"><h4>Nährwerte</h4>
        <div class="nutrition-grid">
          <div class="nutr-item"><div class="nutr-val">${r.calories||'—'}</div><div class="nutr-label">Kalorien</div></div>
          <div class="nutr-item"><div class="nutr-val">${r.protein||'—'}</div><div class="nutr-label">Protein</div></div>
          <div class="nutr-item"><div class="nutr-val">${r.carbs||'—'}</div><div class="nutr-label">Kohlenhydrate</div></div>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('recipeContent').innerHTML = `<button class="modal-close" onclick="closeRecipe()">✕</button><p style="padding:20px;color:var(--muted)">Rezept konnte nicht geladen werden.</p>`;
  }
}
function closeRecipe() { document.getElementById('recipeModal').classList.remove('open'); }

// ─── ARCHIVE ────────────────────────────────────────────────────────────────
function renderArchive() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const cat = document.getElementById('filterCat')?.value||'';
  const st = document.getElementById('filterStatus')?.value||'';
  let filtered = polls.filter(p => {
    if (q && !p.question.toLowerCase().includes(q)) return false;
    if (cat && p.category !== cat) return false;
    if (st && p.status !== st) return false;
    return true;
  });
  const grid = document.getElementById('archiveGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">Keine Abstimmungen gefunden</div>';
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const total = p.options.reduce((s,o)=>s+o.votes,0);
    return `<div class="archive-card" onclick="openVote(polls.find(x=>x.id===${p.id}))">
      <div class="arc-top">
        <span class="arc-cat">${p.category}</span>
        <span class="badge ${p.status==='Aktiv'?'badge-aktiv':'badge-beendet'}">${p.status}</span>
      </div>
      <div class="arc-q">${p.question}</div>
      <div class="arc-votes">👥 ${total} Stimmen</div>
      <div class="arc-dots">${p.options.map(o=>`<div class="arc-dot" style="background:${o.color}"></div>`).join('')}</div>
    </div>`;
  }).join('');
}

// ─── TOAST ──────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
