<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veloura — Entscheide, aber make it fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, query, orderBy, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const cfg = {
      apiKey:"AIzaSyBszQQ9O3EsHwS-E2B9C6pclkurBL8Tn3I",
      authDomain:"valoura-cf295.firebaseapp.com",
      projectId:"valoura-cf295",
      storageBucket:"valoura-cf295.firebasestorage.app",
      messagingSenderId:"638222090779",
      appId:"1:638222090779:web:fc78e9589e1f5a347deebe"
    };
    const app = initializeApp(cfg);
    window._db = getFirestore(app);
    window._fb = { collection, doc, addDoc, updateDoc, onSnapshot, query, orderBy, getDoc };
    window._firebaseReady = true;
    document.dispatchEvent(new Event('firebaseReady'));
  </script>
  <style>
    :root {
      --forest:#40594f; --lime:#ecf38f; --sky:#a1baf5; --lavender:#9698dc;
      --coral:#df663a; --cream:#f5f2eb; --offwhite:#faf9f6;
      --text:#1a1a1a; --muted:#888; --card:rgba(255,255,255,0.78);
      --radius:20px; --shadow:0 8px 40px rgba(0,0,0,0.07);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:'DM Sans',sans-serif;background:var(--offwhite);color:var(--text);}

    /* BG */
    .bg-blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.35;pointer-events:none;z-index:0;}
    .blob1{width:500px;height:500px;background:var(--lime);top:-100px;left:-150px;}
    .blob2{width:400px;height:400px;background:var(--sky);bottom:-80px;right:-100px;}
    .blob3{width:300px;height:300px;background:var(--lavender);top:40%;left:60%;}

    /* NAV */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;padding:14px 32px;
      background:rgba(250,249,246,0.88);backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(0,0,0,0.06);
    }
    .nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
    .logo-circle{
      width:36px;height:36px;border-radius:50%;background:var(--forest);color:var(--lime);
      display:flex;align-items:center;justify-content:center;
      font-family:'Playfair Display',serif;font-size:17px;font-weight:700;
      box-shadow:0 0 0 3px rgba(161,186,245,.4);
    }
    .nav-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;}
    .nav-links{display:flex;gap:6px;}
    .nav-btn{
      padding:7px 18px;border-radius:50px;border:none;cursor:pointer;
      font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
      background:transparent;color:var(--text);transition:all .2s;
    }
    .nav-btn:hover{background:rgba(0,0,0,.05);}
    .nav-btn.active{background:var(--forest);color:var(--lime);}

    /* PAGES — full viewport, scroll inside */
    .page{
      display:none;position:fixed;inset:0;top:60px;
      overflow-y:auto;z-index:1;
    }
    .page.active{display:block;}

    /* HOME */
    .home-wrap{
      min-height:calc(100vh - 60px);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:60px 32px;
    }
    .home-logo{
      width:88px;height:88px;border-radius:50%;background:var(--forest);color:var(--lime);
      display:flex;align-items:center;justify-content:center;
      font-family:'Playfair Display',serif;font-size:40px;font-weight:700;
      margin:0 auto 22px;
      box-shadow:0 0 0 6px rgba(161,186,245,.3),0 20px 60px rgba(64,89,79,.2);
      animation:float 4s ease-in-out infinite;
    }
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .home-title{font-family:'Playfair Display',serif;font-size:clamp(40px,7vw,76px);line-height:1.1;margin-bottom:18px;}
    .home-title em{color:var(--coral);font-style:italic;}
    .home-sub{font-size:17px;color:var(--muted);max-width:380px;margin:0 auto 44px;line-height:1.6;}
    .btn-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
    .btn-primary{
      padding:15px 34px;border-radius:50px;border:none;cursor:pointer;
      background:var(--forest);color:var(--lime);font-family:'DM Sans',sans-serif;
      font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px;
      transition:all .2s;box-shadow:0 4px 20px rgba(64,89,79,.25);
    }
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(64,89,79,.35);}
    .btn-secondary{
      padding:15px 34px;border-radius:50px;border:1.5px solid rgba(0,0,0,.12);
      cursor:pointer;background:white;color:var(--text);
      font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;transition:all .2s;
    }
    .btn-secondary:hover{background:var(--cream);}

    /* CREATE */
    .page-inner{max-width:700px;margin:0 auto;padding:48px 32px 80px;}
    .page-label{font-size:11px;font-weight:500;letter-spacing:2px;color:var(--coral);text-transform:uppercase;margin-bottom:8px;}
    .page-title{font-family:'Playfair Display',serif;font-size:38px;margin-bottom:36px;}
    .card{background:var(--card);backdrop-filter:blur(20px);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.8);}
    .field-label{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;}
    .field-group{margin-bottom:22px;}
    .input-field{
      width:100%;padding:13px 16px;border-radius:12px;
      border:1.5px solid rgba(0,0,0,.08);background:rgba(255,255,255,.8);
      font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;
    }
    .input-field:focus{border-color:var(--forest);}
    .input-field::placeholder{color:#bbb;}
    .select-wrap{position:relative;}
    .select-field{
      width:100%;padding:13px 16px;border-radius:12px;
      border:1.5px solid rgba(0,0,0,.08);background:rgba(255,255,255,.8);
      font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;appearance:none;cursor:pointer;
    }
    .select-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);}
    .options-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .ai-btn{background:none;border:none;cursor:pointer;color:var(--lavender);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;transition:opacity .2s;}
    .ai-btn:hover{opacity:.7;}
    .option-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .option-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;}
    .option-input{flex:1;padding:11px 14px;border-radius:10px;border:1.5px solid rgba(0,0,0,.08);background:rgba(255,255,255,.8);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
    .option-input:focus{border-color:var(--forest);}
    .option-remove{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;transition:color .2s;line-height:1;}
    .option-remove:hover{color:var(--coral);}
    .add-option-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;display:flex;align-items:center;gap:5px;padding:6px 0;transition:color .2s;}
    .add-option-btn:hover{color:var(--forest);}
    .start-btn{
      width:100%;padding:15px;border-radius:12px;border:none;cursor:pointer;
      background:var(--forest);color:var(--lime);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
      margin-top:24px;display:flex;align-items:center;justify-content:center;gap:8px;
      transition:all .2s;box-shadow:0 4px 20px rgba(64,89,79,.2);
    }
    .start-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(64,89,79,.3);}
    .ai-loading{display:flex;align-items:center;gap:8px;color:var(--lavender);font-size:13px;padding:8px 0;}
    .spinner{width:15px;height:15px;border:2px solid rgba(150,152,220,.2);border-top-color:var(--lavender);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* VOTE */
    .vote-inner{max-width:1060px;margin:0 auto;padding:40px 32px 80px;}
    .badge{padding:4px 11px;border-radius:50px;font-size:12px;font-weight:500;}
    .badge-aktiv{background:var(--lime);color:var(--forest);}
    .badge-beendet{background:#f0f0f0;color:var(--muted);}
    .vote-title{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,44px);margin:10px 0 32px;}
    .back-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;display:flex;align-items:center;gap:5px;transition:color .2s;}
    .back-btn:hover{color:var(--text);}
    .link-btn,.end-btn{padding:7px 18px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
    .link-btn{border:1.5px solid rgba(0,0,0,.12);background:white;color:var(--text);transition:all .2s;}
    .link-btn:hover{background:var(--cream);}
    .end-btn{border:1.5px solid var(--coral);background:white;color:var(--coral);transition:all .2s;}
    .end-btn:hover{background:var(--coral);color:white;}
    .vote-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    @media(max-width:720px){.vote-grid{grid-template-columns:1fr;}}

    /* WHEEL */
    .wheel-card{background:var(--card);backdrop-filter:blur(20px);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.8);display:flex;flex-direction:column;align-items:center;}
    .wheel-result-label{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:20px;padding:9px 22px;background:white;border-radius:50px;box-shadow:0 2px 12px rgba(0,0,0,.08);min-width:150px;text-align:center;}
    .wheel-wrap{position:relative;margin-bottom:22px;}
    #wheelCanvas{display:block;}
    .wheel-pointer{position:absolute;top:-16px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:22px solid var(--lavender);filter:drop-shadow(0 2px 6px rgba(150,152,220,.5));}
    .wheel-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
    .spin-btn{padding:11px 26px;border-radius:50px;border:none;cursor:pointer;background:var(--forest);color:var(--lime);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;transition:all .2s;}
    .spin-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(64,89,79,.3);}
    .spin-btn:disabled{opacity:.5;cursor:not-allowed;}
    .ctrl-btn{padding:11px 18px;border-radius:50px;border:1.5px solid rgba(0,0,0,.12);background:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;display:flex;align-items:center;gap:5px;color:var(--text);transition:all .2s;}
    .ctrl-btn:hover:not(:disabled){background:var(--cream);}
    .ctrl-btn:disabled{opacity:.4;cursor:not-allowed;}

    /* VOTE PANEL */
    .vote-panel{display:flex;flex-direction:column;gap:14px;}
    .vote-list-card,.results-card{background:var(--card);backdrop-filter:blur(20px);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.8);}
    .panel-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:16px;}
    .vote-option{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:8px;cursor:pointer;transition:all .2s;}
    .vote-option:hover{background:rgba(0,0,0,.02);}
    .vote-option.voted{background:rgba(64,89,79,.06);}
    .opt-left{display:flex;align-items:center;gap:10px;flex:1;}
    .opt-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
    .opt-name{font-size:14px;}
    .opt-count{font-size:13px;color:var(--muted);}
    .vote-it-btn{padding:5px 14px;border-radius:50px;border:1.5px solid rgba(0,0,0,.12);background:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;transition:all .2s;color:var(--text);white-space:nowrap;}
    .vote-it-btn:hover{background:var(--forest);color:var(--lime);border-color:var(--forest);}
    .vote-it-btn.voted{background:var(--forest);color:var(--lime);border-color:var(--forest);}
    .no-votes{color:var(--muted);font-size:13px;text-align:center;padding:20px 0;}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal{background:white;border-radius:22px;padding:36px;max-width:520px;width:100%;max-height:82vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.15);animation:modalIn .3s ease;}
    @keyframes modalIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-close{float:right;background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);}
    .modal-title{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:5px;}
    .modal-sub{color:var(--muted);font-size:12px;margin-bottom:22px;}
    .recipe-section{margin-bottom:18px;}
    .recipe-section h4{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--coral);margin-bottom:8px;}
    .recipe-section ul{list-style:none;}
    .recipe-section li{font-size:13px;padding:5px 0;border-bottom:1px solid #f0f0f0;color:#444;}
    .recipe-section p{font-size:13px;line-height:1.7;color:#444;}
    .nutrition-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .nutr-item{background:var(--cream);border-radius:10px;padding:10px;text-align:center;}
    .nutr-val{font-size:18px;font-weight:600;color:var(--forest);}
    .nutr-label{font-size:10px;color:var(--muted);margin-top:2px;}

    /* ARCHIV */
    .archiv-inner{max-width:1060px;margin:0 auto;padding:48px 32px 80px;}
    .archive-controls{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
    .search-input{flex:1;min-width:180px;padding:11px 16px;border-radius:50px;border:1.5px solid rgba(0,0,0,.08);background:white;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
    .search-input:focus{border-color:var(--forest);}
    .filter-select{padding:11px 16px;border-radius:50px;border:1.5px solid rgba(0,0,0,.08);background:white;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;outline:none;}
    .archive-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .archive-card{background:var(--card);backdrop-filter:blur(20px);border-radius:16px;padding:22px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.8);cursor:pointer;transition:all .2s;}
    .archive-card:hover{transform:translateY(-3px);box-shadow:0 16px 50px rgba(0,0,0,.1);}
    .arc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
    .arc-cat{font-size:10px;padding:3px 9px;border-radius:50px;background:rgba(0,0,0,.05);color:var(--muted);}
    .arc-q{font-family:'Playfair Display',serif;font-size:16px;margin-bottom:10px;line-height:1.3;}
    .arc-votes{font-size:12px;color:var(--muted);margin-bottom:10px;}
    .arc-dots{display:flex;gap:4px;}
    .arc-dot{width:9px;height:9px;border-radius:50%;}
    .empty-state{grid-column:1/-1;text-align:center;padding:70px 0;color:var(--muted);font-size:15px;}

    /* TOAST */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--forest);color:var(--lime);padding:12px 26px;border-radius:50px;font-size:13px;font-weight:500;z-index:300;transition:transform .3s ease;box-shadow:0 8px 30px rgba(64,89,79,.3);}
    .toast.show{transform:translateX(-50%) translateY(0);}
    #confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:999;display:none;}
  </style>
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<nav>
  <div class="nav-logo" onclick="showPage('home')">
    <div class="logo-circle">V</div>
    <span class="nav-name">Veloura</span>
  </div>
  <div class="nav-links">
    <button class="nav-btn active" id="nav-home"   onclick="showPage('home')">🏠 Home</button>
    <button class="nav-btn"        id="nav-create" onclick="showPage('create')">+ Erstellen</button>
    <button class="nav-btn"        id="nav-archiv" onclick="showPage('archiv')">🗃 Archiv</button>
  </div>
</nav>

<!-- HOME -->
<div class="page active" id="home">
  <div class="home-wrap">
    <div class="home-logo">V</div>
    <h1 class="home-title">Entscheide, aber <em>make it fun</em></h1>
    <p class="home-sub">Lass das Rad entscheiden und trau dich etwas Neues.</p>
    <div class="btn-row">
      <button class="btn-primary"   onclick="showPage('create')">Abstimmung erstellen →</button>
      <button class="btn-secondary" onclick="showPage('archiv')">Archiv durchstöbern</button>
    </div>
  </div>
</div>

<!-- CREATE -->
<div class="page" id="create">
  <div class="page-inner">
    <div class="page-label">NEU ERSTELLEN</div>
    <h1 class="page-title">Deine Abstimmung</h1>
    <div class="card">
      <div class="field-group">
        <div class="field-label">FRAGE</div>
        <input type="text" id="questionInput" class="input-field" placeholder="Was essen wir heute Abend?">
      </div>
      <div class="field-group">
        <div class="field-label">KATEGORIE</div>
        <div class="select-wrap">
          <select id="categorySelect" class="select-field">
            <option>Sonstiges</option>
            <option>Outdoor</option><option>Indoor</option><option>Activity</option>
            <option>Natur</option><option>Gesundheit</option><option>Food</option>
            <option>Essen</option><option>Trinken</option><option>Design</option>
            <option>Reisen</option><option>Ausflüge</option>
            <option>Kaufentscheidungen</option><option>Nice to have</option><option>Fun</option>
          </select>
          <span class="select-arrow">∨</span>
        </div>
      </div>
      <div class="field-group">
        <div class="options-header">
          <div class="field-label" style="margin:0">OPTIONEN</div>
          <button class="ai-btn" onclick="generateAIIdeas()">✦ KI-Ideen generieren</button>
        </div>
        <div id="optionsList"></div>
        <div id="aiLoadingMsg" style="display:none" class="ai-loading"><div class="spinner"></div> KI denkt nach…</div>
        <button class="add-option-btn" onclick="addOption()">+ Option hinzufügen</button>
      </div>
      <button class="start-btn" onclick="startVote()">Abstimmung starten →</button>
    </div>
  </div>
</div>

<!-- VOTE -->
<div class="page" id="vote">
  <div class="vote-inner">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:10px">
      <button class="back-btn" onclick="goBack()">← Zurück</button>
      <div style="display:flex;gap:10px">
        <button class="link-btn" onclick="copyLink()">🔗 Link</button>
        <button class="end-btn"  onclick="endVote()">Beenden</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span class="badge badge-aktiv" id="voteBadge">Aktiv</span>
      <span style="color:var(--muted);font-size:12px" id="voteCode"></span>
    </div>
    <h2 class="vote-title" id="voteTitle"></h2>
    <div class="vote-grid">
      <div class="wheel-card">
        <div class="wheel-result-label" id="wheelLabel">—</div>
        <div class="wheel-wrap">
          <canvas id="wheelCanvas" width="280" height="280"></canvas>
          <div class="wheel-pointer"></div>
        </div>
        <div class="wheel-controls">
          <button class="spin-btn" id="spinBtn" onclick="spinWheel()">▶ Spin</button>
          <button class="ctrl-btn" id="stopBtn" onclick="stopWheel()" disabled>◻ Stop</button>
          <button class="ctrl-btn" onclick="generateAIIdeasVote()">✦ KI-Ideen</button>
        </div>
      </div>
      <div class="vote-panel">
        <div class="vote-list-card">
          <div class="panel-title">Abstimmen</div>
          <div id="voteOptionsList"></div>
        </div>
        <div class="results-card">
          <div class="panel-title">Ergebnisse</div>
          <div id="resultsArea"><div class="no-votes">Noch keine Stimmen abgegeben</div></div>
          <canvas id="resultsChart" style="display:none;margin-top:14px"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ARCHIV -->
<div class="page" id="archiv">
  <div class="archiv-inner">
    <div class="page-label">ARCHIV</div>
    <h1 class="page-title">Vergangene Abstimmungen</h1>
    <div class="archive-controls">
      <input type="text" class="search-input" placeholder="Suchen…" id="searchInput" oninput="renderArchive()">
      <select class="filter-select" id="filterCat" onchange="renderArchive()">
        <option value="">Alle Kategorien</option>
        <option>Outdoor</option><option>Indoor</option><option>Activity</option>
        <option>Natur</option><option>Gesundheit</option><option>Food</option>
        <option>Essen</option><option>Trinken</option><option>Design</option>
        <option>Reisen</option><option>Ausflüge</option>
        <option>Kaufentscheidungen</option><option>Nice to have</option><option>Fun</option><option>Sonstiges</option>
      </select>
      <select class="filter-select" id="filterStatus" onchange="renderArchive()">
        <option value="">Alle Status</option><option>Aktiv</option><option>Beendet</option>
      </select>
    </div>
    <div class="archive-grid" id="archiveGrid"><div class="empty-state">Laden…</div></div>
  </div>
</div>

<div class="modal-overlay" id="recipeModal">
  <div class="modal"><div id="recipeContent"></div></div>
</div>
<div class="toast" id="toast"></div>
<canvas id="confettiCanvas"></canvas>

<script>
const COLORS = ['#40594f','#a1baf5','#9698dc','#ecf38f','#6db088','#c4d4f8','#b8b9e8','#f2f7a0','#df663a','#f5a88a'];

// ─── SMART FALLBACKS keyed by question keywords ──────────────────────────────
function getFallback(cat, q) {
  const t = (q + ' ' + cat).toLowerCase();
  if (/schuh|sneaker|boot|sandale|stiefel/i.test(t))
    return ['Nike Air Max 95','New Balance 574','Adidas Samba','Veja V-10','Salomon XT-6','On Cloud 5'];
  if (/essen|kochen|gericht|food|abend|mittag|frühstück|lunch|dinner/i.test(t))
    return ['Miso-Aubergine mit Sesamreis','Kichererbsensalat mit Feta','Zucchini-Nudeln mit Lachs','Ofensüßkartoffel mit Tahini','Grünes Kokos-Curry','Mediterrane Bowl'];
  if (/trinken|getränk|cocktail|drink|café|kaffee/i.test(t))
    return ['Matcha Latte','Aperol Spritz','Cold Brew','Kombucha','Mojito','Chai Latte'];
  if (/ausflug|trip|tagesausflug|wohin|ziel/i.test(t))
    return ['Schwarzwald','Bodensee','Heidelberg','Straßburg','Freiburg','Karlsruhe'];
  if (/kaufen|kaufentscheid|shoppen|bestellen/i.test(t))
    return ['Jetzt kaufen','Noch warten','Second-hand','Leihen','Selbst machen','Verzichten'];
  if (/reise|urlaub|ferien|wohin/i.test(t))
    return ['Lissabon','Kyoto','Kopenhagen','Oaxaca','Ljubljana','Tbilisi'];
  if (/outdoor|wandern|natur|berge/i.test(t))
    return ['Wandern','Klettern','Radtour','Kajakfahren','Camping','Trailrunning'];
  if (/indoor|sport|fitness/i.test(t))
    return ['Yoga','Pilates','Kletterpark','Tanzen','Bouldern','Schwimmen'];
  if (/fun|spaß|freizei|aktivität/i.test(t))
    return ['Escape Room','Karaoke','Bowling','Minigolf','Kochkurs','Töpfern'];
  if (/gesundheit|wellness|entspannung/i.test(t))
    return ['Meditation','Waldspaziergang','Digital Detox','Atemübungen','Journaling','Sauna'];
  return ['Option A','Option B','Option C','Option D','Option E','Option F'];
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let polls = [], currentPoll = null, currentPollId = null, userVote = null, chartInstance = null;
let voteUnsub = null, archiveUnsub = null;
let wheelAngle = 0, wheelVelocity = 0, wheelSpinning = false, wheelStopping = false;

// ─── FIREBASE ────────────────────────────────────────────────────────────────
const db  = () => window._db;
const fb  = () => window._fb;

async function fbSave(poll) {
  const {collection,addDoc} = fb();
  const r = await addDoc(collection(db(),'polls'), poll);
  return r.id;
}
async function fbUpdate(id, data) {
  const {doc,updateDoc} = fb();
  await updateDoc(doc(db(),'polls',id), data);
}
function fbListenAll(cb) {
  const {collection,query,orderBy,onSnapshot} = fb();
  return onSnapshot(query(collection(db(),'polls'),orderBy('created','desc')), snap => {
    polls = snap.docs.map(d => ({...d.data(), _fid:d.id}));
    cb();
  });
}
function fbListenOne(id, cb) {
  const {doc,onSnapshot} = fb();
  return onSnapshot(doc(db(),'polls',id), snap => {
    if (snap.exists()) cb({...snap.data(), _fid:snap.id});
  });
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-'+id);
  if (nb) nb.classList.add('active');
  // scroll the page container to top
  document.getElementById(id).scrollTop = 0;
  if (id === 'archiv') startArchiveListener();
  if (id === 'create') initCreate();
}

function goBack() {
  if (voteUnsub) { voteUnsub(); voteUnsub = null; }
  showPage('archiv');
}

// ─── CREATE ──────────────────────────────────────────────────────────────────
let options = [];
function initCreate() {
  document.getElementById('questionInput').value = '';
  document.getElementById('categorySelect').value = 'Sonstiges';
  options = [{val:''},{val:''}];
  renderOptions();
}
function renderOptions() {
  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  options.forEach((o,i) => {
    const d = document.createElement('div');
    d.className = 'option-item';
    d.innerHTML = `
      <div class="option-dot" style="background:${COLORS[i%COLORS.length]}"></div>
      <input class="option-input" value="${o.val}" placeholder="Option ${i+1}" oninput="options[${i}].val=this.value">
      ${options.length>2?`<button class="option-remove" onclick="removeOption(${i})">✕</button>`:''}`;
    list.appendChild(d);
  });
}
function addOption()     { if(options.length<10){options.push({val:''});renderOptions();} }
function removeOption(i) { options.splice(i,1);renderOptions(); }

// ─── CLAUDE API ──────────────────────────────────────────────────────────────
async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})
  });
  if (!res.ok) throw new Error('API '+res.status);
  const data = await res.json();
  return data.content?.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
}

async function generateAIIdeas() {
  const q   = document.getElementById('questionInput').value.trim();
  const cat = document.getElementById('categorySelect').value;
  if (!q) { showToast('Bitte zuerst eine Frage eingeben'); return; }
  document.getElementById('aiLoadingMsg').style.display = 'flex';
  try {
    // Always base prompt primarily on the question text, not just category
    const prompt = `Du bist ein kreativer Assistent. Die Nutzer-Frage lautet: "${q}" (Kategorie: ${cat}).
Analysiere die Frage genau und generiere 6 passende, konkrete Antwortoptionen auf Deutsch.
Beispiele: "Welche Schuhe kaufen?" → Schuhmodelle. "Was essen?" → Gerichte. "Wohin reisen?" → Reiseziele.
Antworte NUR mit einem validen JSON-Array mit 6 kurzen Strings (1-5 Wörter): ["Opt1","Opt2","Opt3","Opt4","Opt5","Opt6"]`;
    const raw   = await callClaude(prompt);
    const ideas = JSON.parse(raw);
    if (Array.isArray(ideas) && ideas.length >= 2 && ideas.every(i=>typeof i==='string')) {
      options = ideas.slice(0,8).map(v=>({val:String(v)}));
    } else throw new Error('bad');
  } catch {
    options = getFallback(cat, q).map(v=>({val:v}));
  }
  renderOptions();
  document.getElementById('aiLoadingMsg').style.display = 'none';
}

async function startVote() {
  const q    = document.getElementById('questionInput').value.trim();
  const cat  = document.getElementById('categorySelect').value;
  const opts = options.map(o=>o.val.trim()).filter(Boolean);
  if (!q)            { showToast('Bitte eine Frage eingeben'); return; }
  if (opts.length<2) { showToast('Mindestens 2 Optionen nötig'); return; }
  if (!window._firebaseReady) { showToast('Verbindung lädt…'); return; }
  const code = '#'+Math.random().toString(36).substr(2,6).toUpperCase();
  const poll = {
    code, question:q, category:cat,
    options: opts.map((v,i)=>({name:v,votes:0,color:COLORS[i%COLORS.length]})),
    status:'Aktiv', created: new Date().toISOString()
  };
  showToast('Wird gespeichert…');
  try {
    const fid = await fbSave(poll);
    poll._fid = fid;
    openVote(poll);
  } catch(e) { showToast('Firebase-Fehler'); console.error(e); }
}

// ─── VOTE ────────────────────────────────────────────────────────────────────
function openVote(poll) {
  if (voteUnsub) { voteUnsub(); voteUnsub = null; }
  currentPoll = poll; currentPollId = poll._fid; userVote = null;
  document.getElementById('voteTitle').textContent = poll.question;
  document.getElementById('voteCode').textContent  = poll.code;
  updateBadge(poll.status);
  renderVoteOptions(); drawWheel(); renderResults();
  showPage('vote');
  voteUnsub = fbListenOne(currentPollId, updated => {
    currentPoll = updated;
    updateBadge(updated.status);
    renderVoteOptions(); drawWheel(); renderResults();
  });
}

function updateBadge(s) {
  const b = document.getElementById('voteBadge');
  b.textContent = s; b.className = 'badge '+(s==='Aktiv'?'badge-aktiv':'badge-beendet');
}

function isFood(poll) {
  return /essen|gericht|kochen|food|dinner|lunch|frühstück|rezept/i.test(poll.category+' '+poll.question);
}

function renderVoteOptions() {
  const list = document.getElementById('voteOptionsList');
  list.innerHTML = '';
  currentPoll.options.forEach((o,i) => {
    const d = document.createElement('div');
    d.className = 'vote-option'+(userVote===i?' voted':'');
    d.innerHTML = `
      <div class="opt-left">
        <div class="opt-dot" style="background:${o.color}"></div>
        <span class="opt-name">${o.name}</span>
        ${isFood(currentPoll)?`<button onclick="showRecipe('${o.name.replace(/'/g,"\\'")}\')" style="background:none;border:none;cursor:pointer;color:var(--coral);font-size:11px;margin-left:4px">↗ Rezept</button>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="opt-count">${o.votes}</span>
        <button class="vote-it-btn ${userVote===i?'voted':''}" onclick="castVote(${i})">${userVote===i?'✓':'Stimme'}</button>
      </div>`;
    list.appendChild(d);
  });
}

async function castVote(i) {
  if (currentPoll.status!=='Aktiv') { showToast('Abstimmung beendet'); return; }
  const newOpts = currentPoll.options.map((o,idx)=>({
    ...o, votes: idx===i ? o.votes+1 : (userVote===idx ? o.votes-1 : o.votes)
  }));
  userVote = i;
  try { await fbUpdate(currentPollId,{options:newOpts}); }
  catch(e) { showToast('Fehler beim Speichern'); }
}

async function endVote() {
  try { await fbUpdate(currentPollId,{status:'Beendet'}); showToast('Abstimmung beendet'); }
  catch { showToast('Fehler'); }
}

function copyLink() {
  const url = window.location.href.split('?')[0]+'?poll='+currentPollId;
  navigator.clipboard?.writeText(url).catch(()=>{});
  showToast('Link kopiert! 🔗');
}

// ─── RESULTS ─────────────────────────────────────────────────────────────────
function renderResults() {
  const total = currentPoll.options.reduce((s,o)=>s+o.votes,0);
  const area  = document.getElementById('resultsArea');
  const cc    = document.getElementById('resultsChart');
  if (!total) {
    area.innerHTML='<div class="no-votes">Noch keine Stimmen abgegeben</div>';
    cc.style.display='none';
    if(chartInstance){chartInstance.destroy();chartInstance=null;}
    return;
  }
  area.innerHTML = currentPoll.options.map(o=>{
    const pct = Math.round(o.votes/total*100);
    return `<div style="margin-bottom:9px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span style="display:flex;align-items:center;gap:5px">
          <span style="width:7px;height:7px;border-radius:50%;background:${o.color};display:inline-block"></span>${o.name}
        </span>
        <span style="font-weight:500">${pct}%</span>
      </div>
      <div style="background:#f0f0f0;border-radius:50px;height:5px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${o.color};border-radius:50px;transition:width .5s ease"></div>
      </div></div>`;
  }).join('');
  cc.style.display='block';
  if(chartInstance) chartInstance.destroy();
  chartInstance=new Chart(cc,{
    type:'doughnut',
    data:{labels:currentPoll.options.map(o=>o.name),datasets:[{data:currentPoll.options.map(o=>o.votes||.001),backgroundColor:currentPoll.options.map(o=>o.color),borderWidth:0}]},
    options:{plugins:{legend:{display:false}},cutout:'65%',animation:{duration:600}}
  });
}

// ─── WHEEL ───────────────────────────────────────────────────────────────────
function drawWheel() {
  const canvas=document.getElementById('wheelCanvas'),ctx=canvas.getContext('2d');
  const cx=140,cy=140,r=132;
  ctx.clearRect(0,0,280,280);
  const n=currentPoll.options.length, arc=(2*Math.PI)/n;
  for(let i=0;i<n;i++){
    const s=wheelAngle+i*arc,e=s+arc,o=currentPoll.options[i];
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=o.color;ctx.fill();
    ctx.save();ctx.globalAlpha=.14;
    const g=ctx.createRadialGradient(cx,cy,8,cx,cy,r);
    g.addColorStop(0,'white');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();ctx.fill();ctx.restore();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(s+arc/2);ctx.textAlign='right';
    ctx.fillStyle='#fff';ctx.font='bold 12px DM Sans,sans-serif';
    ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=4;
    ctx.fillText(o.name.length>10?o.name.substr(0,10)+'…':o.name,r-8,5);ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,11,0,2*Math.PI);ctx.fillStyle='white';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,5,0,2*Math.PI);ctx.fillStyle='#ccc';ctx.fill();
  document.getElementById('wheelLabel').textContent=currentPoll.options[getCurrentSeg()]?.name||'—';
}

function getCurrentSeg() {
  const n=currentPoll.options.length,arc=(2*Math.PI)/n;
  return Math.floor((((-Math.PI/2-wheelAngle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI))/arc)%n;
}

function spinWheel() {
  if(wheelSpinning) return;
  wheelSpinning=true;wheelStopping=false;
  wheelVelocity=.15+Math.random()*.1;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('stopBtn').disabled=false;
  animateWheel();
}
function stopWheel(){ wheelStopping=true; document.getElementById('stopBtn').disabled=true; }

function animateWheel() {
  if(!wheelSpinning) return;
  wheelVelocity=wheelStopping?wheelVelocity*.965:Math.min(wheelVelocity+.004,.18);
  wheelAngle+=wheelVelocity;
  drawWheel();
  if(wheelStopping&&wheelVelocity<.002){
    wheelSpinning=false;wheelStopping=false;
    document.getElementById('spinBtn').disabled=false;
    document.getElementById('stopBtn').disabled=true;
    const w=getCurrentSeg();
    castVote(w);
    showToast('🎯 '+currentPoll.options[w].name+' wurde gewählt!');
    launchConfetti();
    return;
  }
  requestAnimationFrame(animateWheel);
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
function launchConfetti(){
  const c=document.getElementById('confettiCanvas');
  c.width=innerWidth;c.height=innerHeight;c.style.display='block';
  const ctx=c.getContext('2d');
  const cols=['#ecf38f','#a1baf5','#9698dc','#df663a','#40594f','#f5a88a','#c4d4f8'];
  const p=Array.from({length:110},()=>({
    x:Math.random()*c.width,y:-20-Math.random()*80,r:4+Math.random()*6,
    col:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*Math.PI*2,
    vx:(Math.random()-.5)*4,vy:2+Math.random()*3,vr:(Math.random()-.5)*.15,
    rect:Math.random()>.5
  }));
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);let alive=false;
    p.forEach(q=>{
      q.x+=q.vx;q.y+=q.vy;q.rot+=q.vr;q.vy+=.08;
      if(q.y<c.height+20)alive=true;
      ctx.save();ctx.globalAlpha=Math.max(0,1-f/85);
      ctx.translate(q.x,q.y);ctx.rotate(q.rot);ctx.fillStyle=q.col;
      if(q.rect)ctx.fillRect(-q.r,-q.r/2,q.r*2,q.r);
      else{ctx.beginPath();ctx.arc(0,0,q.r,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    f++;
    if(alive&&f<110)requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,c.width,c.height);c.style.display='none';}
  })();
}

// ─── AI IDEAS IN VOTE ─────────────────────────────────────────────────────────
async function generateAIIdeasVote(){
  showToast('KI denkt nach…');
  const q=currentPoll.question,cat=currentPoll.category;
  try{
    const prompt=`Die Frage lautet: "${q}" (Kategorie: ${cat}). Schlage 4 weitere passende, konkrete Antwortoptionen auf Deutsch vor (1-4 Wörter). Nur JSON-Array: ["Opt1","Opt2","Opt3","Opt4"]`;
    const raw=await callClaude(prompt);
    const ideas=JSON.parse(raw);
    if(Array.isArray(ideas)&&ideas.length){
      const newOpts=[...currentPoll.options];
      ideas.forEach(v=>{if(newOpts.length<10)newOpts.push({name:String(v),votes:0,color:COLORS[newOpts.length%COLORS.length]});});
      await fbUpdate(currentPollId,{options:newOpts});
      showToast('KI-Ideen hinzugefügt!');
    }
  }catch{
    const fb2=getFallback(cat,q).slice(0,3);
    const newOpts=[...currentPoll.options];
    fb2.forEach(v=>{if(newOpts.length<10&&!newOpts.find(o=>o.name===v))newOpts.push({name:v,votes:0,color:COLORS[newOpts.length%COLORS.length]});});
    await fbUpdate(currentPollId,{options:newOpts}).catch(()=>{});
    showToast('Ideen hinzugefügt!');
  }
}

// ─── RECIPE ──────────────────────────────────────────────────────────────────
async function showRecipe(dish){
  document.getElementById('recipeModal').classList.add('open');
  document.getElementById('recipeContent').innerHTML=`<div class="ai-loading" style="justify-content:center;padding:40px 0"><div class="spinner"></div> Rezept wird geladen…</div>`;
  try{
    const raw=await callClaude(`Erstelle ein kurzes Rezept für "${dish}". NUR als JSON:
{"title":"${dish}","time":"X Min","servings":2,"ingredients":["Zutat"],"steps":["Schritt"],"calories":350,"protein":"20g","carbs":"40g"}`);
    const r=JSON.parse(raw);
    document.getElementById('recipeContent').innerHTML=`
      <button class="modal-close" onclick="closeRecipe()">✕</button>
      <div class="modal-title">${r.title}</div>
      <div class="modal-sub">⏱ ${r.time} · 🍽 ${r.servings} Portionen</div>
      <div class="recipe-section"><h4>Zutaten</h4><ul>${(r.ingredients||[]).map(i=>`<li>${i}</li>`).join('')}</ul></div>
      <div class="recipe-section"><h4>Zubereitung</h4>${(r.steps||[]).map((s,i)=>`<p style="margin-bottom:7px"><strong>${i+1}.</strong> ${s}</p>`).join('')}</div>
      <div class="recipe-section"><h4>Nährwerte</h4>
        <div class="nutrition-grid">
          <div class="nutr-item"><div class="nutr-val">${r.calories||'—'}</div><div class="nutr-label">Kalorien</div></div>
          <div class="nutr-item"><div class="nutr-val">${r.protein||'—'}</div><div class="nutr-label">Protein</div></div>
          <div class="nutr-item"><div class="nutr-val">${r.carbs||'—'}</div><div class="nutr-label">Kohlenhydrate</div></div>
        </div>
      </div>`;
  }catch{
    document.getElementById('recipeContent').innerHTML=`<button class="modal-close" onclick="closeRecipe()">✕</button><p style="padding:20px;color:var(--muted)">Rezept konnte nicht geladen werden.</p>`;
  }
}
function closeRecipe(){ document.getElementById('recipeModal').classList.remove('open'); }

// ─── ARCHIVE ─────────────────────────────────────────────────────────────────
function startArchiveListener(){
  if(archiveUnsub){renderArchive();return;}
  if(!window._firebaseReady){
    document.addEventListener('firebaseReady',()=>{archiveUnsub=fbListenAll(renderArchive);},{once:true});
    return;
  }
  archiveUnsub=fbListenAll(renderArchive);
}

function renderArchive(){
  const q  =(document.getElementById('searchInput')?.value||'').toLowerCase();
  const cat= document.getElementById('filterCat')?.value||'';
  const st = document.getElementById('filterStatus')?.value||'';
  const f=polls.filter(p=>{
    if(q&&!p.question.toLowerCase().includes(q))return false;
    if(cat&&p.category!==cat)return false;
    if(st&&p.status!==st)return false;
    return true;
  });
  const grid=document.getElementById('archiveGrid');
  if(!f.length){grid.innerHTML='<div class="empty-state">Keine Abstimmungen gefunden</div>';return;}
  grid.innerHTML=f.map(p=>{
    const total=p.options.reduce((s,o)=>s+o.votes,0);
    const safe=JSON.stringify(p).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="archive-card" onclick='openVote(${safe})'>
      <div class="arc-top">
        <span class="arc-cat">${p.category}</span>
        <span class="badge ${p.status==='Aktiv'?'badge-aktiv':'badge-beendet'}">${p.status}</span>
      </div>
      <div class="arc-q">${p.question}</div>
      <div class="arc-votes">👥 ${total} Stimmen</div>
      <div class="arc-dots">${p.options.map(o=>`<div class="arc-dot" style="background:${o.color}"></div>`).join('')}</div>
    </div>`;
  }).join('');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
initCreate();

function checkUrlPoll(){
  const id=new URLSearchParams(window.location.search).get('poll');
  if(!id)return;
  const {doc,getDoc}=fb();
  getDoc(doc(db(),'polls',id)).then(snap=>{
    if(snap.exists())openVote({...snap.data(),_fid:snap.id});
  }).catch(()=>{});
}
if(window._firebaseReady)checkUrlPoll();
else document.addEventListener('firebaseReady',checkUrlPoll,{once:true});
